<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>

    <button id="theme-toggle">🌙</button>

    <div class="container">
        <h1>Meu Controle de Gastos 💰</h1>

        <form th:object="${novoLancamento}" hx-post="/lancamentos" hx-target="#lista-lancamentos" hx-swap="outerHTML"
            hx-on::after-request="this.reset()" class="form-row">
            <div class="field-group">
                <input class="input-desc" type="text" th:field="*{descricao}" placeholder="Descrição" required>
                <span class="error-message" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></span>
            </div>
            <div class="field-group">
                <input class="input-valor" type="number" step="0.01" th:field="*{valor}" placeholder="Valor" required>
                <span class="error-message" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></span>
            </div>
            <div class="field-group">
                <select class="select-tipo" th:field="*{tipo}" required>
                    <option th:each="tipoOpt : ${tipos}" th:value="${tipoOpt}" th:text="${tipoOpt}"></option>
                </select>
            </div>
            <button type="submit" class="add-btn">Adicionar</button>
        </form>

        <div id="lista-lancamentos" th:fragment="lista-lancamentos">
            <div class="saldo-card">
                <div class="saldo-title">Saldo Atual</div>
                <div class="saldo-valor" th:text="|R$ ${#numbers.formatDecimal(saldo, 1, 'POINT', 2, 'COMMA')}|"
                    th:classappend="${saldo.signum() < 0 ? 'despesa' : 'receita'}"></div>
            </div>
                <div class="list-header">
                    <div class="col-desc">Descrição</div>
                    <div class="col-valor">Valor</div>
                    <div class="col-data">Data</div>
                    <div class="col-tipo">Tipo</div>
                    <div class="col-acoes">Ações</div>
                </div>

                <div th:each="lancamento : ${lancamentos}" th:id="'lancamento-' + ${lancamento.id}" class="list-item">
                    <div class="col-desc" th:text="${lancamento.descricao}"></div>
                    <div class="col-valor valor"
                        th:text="|R$ ${#numbers.formatDecimal(lancamento.valor, 1, 'POINT', 2, 'COMMA')}|"
                        th:classappend="${lancamento.tipo.name() == 'DESPESA' ? 'despesa' : 'receita'}">
                    </div>
                    <div class="col-data" th:text="${#temporals.format(lancamento.data, 'dd/MM/yyyy')}"></div>
                    <div class="col-tipo" th:text="${lancamento.tipo.name()}"></div>
                    <div class="col-acoes">
                        <div class="actions-wrapper">
                            <button class="action-btn edit-btn"
                                th:hx-get="@{/lancamentos/editar/{id}(id=${lancamento.id})}"
                                th:hx-target="'#lancamento-' + ${lancamento.id}" hx-swap="outerHTML">
                                Alterar
                            </button>
                            <button class="action-btn delete-btn"
                                th:hx-delete="@{/lancamentos/{id}(id=${lancamento.id},page=${currentPage})}"
                                hx-target="#lista-lancamentos" hx-swap="outerHTML" hx-confirm="Tem certeza que deseja excluir?">
                                Excluir
                            </button>
                        </div>
                    </div>
                </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <button th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}" th:text="${pageNumber + 1}"
                    th:classappend="${pageNumber == currentPage} ? ' active' : ''" th:hx-get="@{/(page=${pageNumber})}"
                    hx-target="#lista-lancamentos" hx-swap="outerHTML" hx-push-url="true">
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        Carlos Eduardo Paiva Santos (c) 2025
    </div>

    <th:block th:fragment="form-edicao">
        <div th:if="${lancamentoParaEditar != null and lancamentoParaEditar.id != null}"
            th:id="'lancamento-' + ${lancamentoParaEditar.id}" class="edit-form-row">
            <div class="col-desc">
                <input type="text" name="descricao" th:value="${lancamentoParaEditar.descricao}">
            </div>
            <div class="col-valor">
                <input type="number" step="0.01" name="valor" th:value="${lancamentoParaEditar.valor}">
            </div>
            <div class="col-data">
                <input type="date" name="data" th:value="${#temporals.format(lancamentoParaEditar.data, 'yyyy-MM-dd')}">
            </div>
            <div class="col-tipo">
                <select name="tipo">
                    <option th:each="tipoOpt : ${tipos}" th:value="${tipoOpt}" th:text="${tipoOpt}"
                        th:selected="${tipoOpt == lancamentoParaEditar.tipo}"></option>
                </select>
            </div>
            <div class="col-acoes">
                <div class="actions-wrapper">
                    <button class="action-btn save-btn" th:hx-put="@{/lancamentos/{id}(id=${lancamentoParaEditar.id},page=${currentPage})}"
                        hx-target="#lista-lancamentos" hx-swap="outerHTML" hx-include="closest .edit-form-row">
                        Salvar
                    </button>
                    <button class="action-btn cancel-btn" th:hx-get="@{/lancamentos/lista(page=${currentPage})}"
                        hx-target="#lista-lancamentos" hx-swap="outerHTML">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </th:block>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                themeToggle.textContent = '🌙';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                themeToggle.textContent = '☀️';
            }
        });
    </script>

</body>

</html>
